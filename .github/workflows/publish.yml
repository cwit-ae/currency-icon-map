name: Publish to npm

on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # OIDC Trusted Publishing requires npm >= 11.5.1; pin to a known-good line
      # rather than relying on whatever npm the Node image happens to ship.
      - run: npm install -g npm@latest

      - run: npm ci --ignore-scripts
      - run: npm audit signatures --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm run build

      # Authenticates via OIDC Trusted Publishing (no NPM_TOKEN required) and
      # attaches a provenance attestation automatically.
      - run: npm publish --provenance --access public
