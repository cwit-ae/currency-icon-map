name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm audit signatures --audit-level=high
      # Advisory gate: fail the build on any high/critical advisory in the tree
      # (registry-signature check above does not look at advisories). Moderate
      # and lower are surfaced by Dependabot/CodeQL rather than blocking PRs.
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Verify tarball contents
        run: npm pack --dry-run

      # Install the packed tarball into real ESM + CommonJS consumer projects
      # and run import/require — catches dual-package packaging defects that
      # source tests and `pack --dry-run` cannot.
      - name: Smoke-test packed tarball (ESM + CJS)
        run: npm run smoke
