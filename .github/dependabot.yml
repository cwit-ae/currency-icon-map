version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Dubai
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      icon-libraries:
        patterns:
          - "lucide-react"
          - "@tabler/icons-react"
          - "@heroicons/react"
          - "@fortawesome/*"
    ignore:
      # TypeScript majors ship breaking deprecations (e.g. 6.0 removed the
      # "node" moduleResolution) and outpace ts-jest support. Pin to 5.x and
      # adopt a new major deliberately, not via an auto-PR. Minor/patch within
      # the current major are still proposed.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: deps
      prefix-development: deps-dev
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Dubai
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
