name: Bug report
description: Report a crash, incorrect behaviour, build issue, or type-definition problem.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more precise the reproduction, the faster we can fix it.

        For a **currency we don't ship** or a **country that resolves to the wrong currency**, use the *Missing or wrong currency* template. For a currency that maps to a **suboptimal icon** in a library, use the *Wrong icon mapping* template.

  - type: input
    id: package-version
    attributes:
      label: currency-icon-map version
      description: Output of `npm ls currency-icon-map` or the version in your `package.json`.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node -v`.
      placeholder: "v20.11.1"
    validations:
      required: true

  - type: dropdown
    id: module-system
    attributes:
      label: Module system / entry point
      options:
        - ESM (import)
        - CommonJS (require)
        - An adapter subpath (/lucide, /tabler, /fontawesome, /heroicons)
        - Both / not sure
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Query / call
      description: The exact call you made, e.g. `getCurrencyIcon("$")` or `resolveIconName("eur", "tabler")`.
      render: ts
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: The full output you observed (or the error / stack trace).
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What you expected to happen, and why.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that helps — minimal repro repository, link to a failing CI run, installed icon-library version, etc.
